name: tally
description: "Log your worked hours and see what they're worth."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  google_sign_in: ^7.2.0

  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3

  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  fl_chart: ^1.2.0

  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1

  pdf: ^3.12.0
  printing: ^5.14.3
  screenshot: ^3.0.0
  share_plus: ^12.0.2
  path_provider: ^2.1.5

  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FF7A29"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 23
